name: Daily Repository Update

on:
  schedule:
    # Runs daily at 07:30 UTC (specific time, no wildcards)
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "25ds2000013@ds.study.iitm.ac.in"

      - name: Daily commit step - 25ds2000013@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update $(date -u)" || echo "No changes to commit"
          git push
